version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/src-react"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "09:00"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    reviewers:
      - "noir-hedgehog"
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
