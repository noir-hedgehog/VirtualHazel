name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Diagnose
        run: |
          set -x
          pwd
          ls -la
          ls -la src-react/
          cat src-react/package.json
          npm ci
          npm run build

      - name: Copy data files
        run: |
          mkdir -p src-react/dist/data
          cp data/corpus.json src-react/dist/data/corpus.json
          cp data/persona.json src-react/dist/data/persona.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src-react/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
