name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Debug workspace
        run: |
          echo "=== pwd ===" && pwd
          echo "=== ls ===" && ls -la
          echo "=== ls src-react ===" && ls -la src-react/ 2>&1 || echo "NOT FOUND"
          echo "=== package.json ===" && cat src-react/package.json

      - name: Install dependencies
        run: |
          cd src-react && npm ci
        working-directory: ${{ github.workspace }}

      - name: Build React app
        run: |
          cd src-react && npm run build
        working-directory: ${{ github.workspace }}

      - name: Validate dist output
        run: |
          cd src-react && echo "=== dist/ contents ===" && ls -la dist/
          cd src-react && echo "=== dist/assets ===" && ls -la dist/assets/ 2>/dev/null || echo "(no assets dir)"
          cd src-react && echo "=== dist/index.html ===" && head -5 dist/index.html
        working-directory: ${{ github.workspace }}

      # Copy data files into src-react/dist/data/ before deploy
      # data/*.json is gitignored; always copy latest versions
      - name: Copy data files
        run: |
          mkdir -p src-react/dist/data
          cp data/corpus.json src-react/dist/data/corpus.json
          cp data/persona.json src-react/dist/data/persona.json
          echo "=== src-react/dist/data/ ===" && ls -la src-react/dist/data/
        working-directory: ${{ github.workspace }}

      # gh-pages deployment
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src-react/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
